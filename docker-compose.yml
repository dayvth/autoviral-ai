version: '3.9'

# AutoViral AI — Docker Compose
# Runs all services: Next.js frontend, Express API, Python workers,
# BullMQ workers, Redis, and Nginx reverse proxy.

services:
  # ── Infrastructure ─────────────────────────────────────────

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-autoviral123} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--pass', '${REDIS_PASSWORD:-autoviral123}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Applications ───────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 4000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '4000:4000'
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - /tmp/autoviral:/tmp/autoviral
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL:-http://api:4000}
    ports:
      - '3000:3000'
    depends_on:
      - api

  python-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 8000
    ports:
      - '8000:8000'
    volumes:
      - /tmp/autoviral:/tmp/autoviral
      - whisper_cache:/root/.cache/whisper
    deploy:
      resources:
        limits:
          memory: 4G

  # ── BullMQ Workers ─────────────────────────────────────────

  script-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
      args:
        WORKER: script-worker
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_HOST: redis
      SCRIPT_WORKER_CONCURRENCY: 5
    depends_on:
      redis:
        condition: service_healthy

  voice-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
      args:
        WORKER: voice-worker
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_HOST: redis
      VOICE_WORKER_CONCURRENCY: 3
    depends_on:
      redis:
        condition: service_healthy

  video-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
      args:
        WORKER: video-worker
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_HOST: redis
      VIDEO_WORKER_CONCURRENCY: 2
      TMP_DIR: /tmp/autoviral
    volumes:
      - /tmp/autoviral:/tmp/autoviral
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G

  upload-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
      args:
        WORKER: upload-worker
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_HOST: redis
      UPLOAD_WORKER_CONCURRENCY: 5
    depends_on:
      redis:
        condition: service_healthy

  analytics-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
      args:
        WORKER: analytics-worker
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_HOST: redis
      ANALYTICS_WORKER_CONCURRENCY: 10
    depends_on:
      redis:
        condition: service_healthy

  # ── Reverse Proxy ─────────────────────────────────────────

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - web
      - api

volumes:
  redis_data:
  whisper_cache:
  nginx_certs:
