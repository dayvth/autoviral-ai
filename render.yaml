services:
  - type: web
    name: autoviral-api
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: autoviral-media
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PYTHON_WORKER_URL
        value: http://localhost:8000
      - key: PYTHON_WORKER_SECRET
        sync: false
      - key: RATE_LIMIT_MAX
        value: 100
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: ENABLE_YOUTUBE_UPLOAD
        value: true
      - key: ENABLE_TIKTOK_UPLOAD
        value: true
      - key: ENABLE_INSTAGRAM_UPLOAD
        value: true
      - key: SCRIPT_WORKER_CONCURRENCY
        value: 2
      - key: VOICE_WORKER_CONCURRENCY
        value: 1
      - key: VIDEO_WORKER_CONCURRENCY
        value: 1
